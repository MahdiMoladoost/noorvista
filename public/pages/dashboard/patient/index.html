        .stat-icon { width: 55px; height: 55px; background: linear-gradient(135deg, #2f89fc, #1a6fdb); border-radius: 15px; display: flex; align-items: center; justify-content: center; }

        .stat-info p { font-size: 13px; color: #64748b; margin: 5px 0 0; }
        .card { background: white; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 18px 25px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .card-header h4 { margin: 0; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .card-header h4 i { color: #2f89fc; }
        .card-body { padding: 20px 25px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .data-table th { background: #f8fafc; font-weight: 600; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-confirmed { background: #dbeafe; color: #2563eb; }
        .badge-completed { background: #dcfce7; color: #059669; }
        .badge-cancelled { background: #fee2e2; color: #dc2626; }
        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-primary { background: #2f89fc; color: white; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; }
    </style>

<thead><tr><th>تاریخ</th><th>ساعت</th><th>پزشک</th><th>وضعیت</th><th>عملیات</th></tr></thead>

<script src="/js/panel-common.js"></script>
<script>
    async function loadPatientDashboard() {
        try {
            const stats = await apiRequest('/patient/stats');
            document.getElementById('totalAppointments').innerHTML = toPersianNumber(stats.totalAppointments || 0);
            document.getElementById('completedAppointments').innerHTML = toPersianNumber(stats.completedAppointments || 0);
            document.getElementById('totalRecords').innerHTML = toPersianNumber(stats.totalRecords || 0);
            
            if (stats.nextAppointment) {
                const nextCard = document.getElementById('nextAppointmentCard');
                nextCard.style.display = 'block';
                document.getElementById('nextAppointmentDateTime').innerHTML = `${toJalali(stats.nextAppointment.appointment_date)} - ${stats.nextAppointment.appointment_time}`;
                document.getElementById('nextAppointmentDoctor').innerHTML = `<i class="icon-user-md"></i> دکتر ${stats.nextAppointment.doctor_name}`;
                document.getElementById('nextAppointmentStatus').innerHTML = `<span class="badge badge-${stats.nextAppointment.status}">${stats.nextAppointment.status === 'confirmed' ? 'تأیید شده' : 'در انتظار'}</span>`;
            }
            
            const recentApps = await apiRequest('/patient/appointments/recent');
            renderRecentAppointments(recentApps.appointments || []);
        } catch(e) { console.error(e); }
    }

    function renderRecentAppointments(appointments) {
        const tbody = document.querySelector('#recentAppointmentsTable tbody');
        if (!appointments.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center">هیچ نوبتی یافت نشد</td></tr>'; return; }
        tbody.innerHTML = appointments.map(app => `
            <tr>
                <td>${toJalali(app.appointment_date)}</td>
                <td>${app.appointment_time || '-'}</td>
                <td>${app.doctor_name || '-'}</td>
                <td><span class="badge badge-${app.status}">${getStatusText(app.status)}</span></td>
                <td><button class="btn-sm btn-outline" onclick="viewAppointment(${app.id})">جزئیات</button></td>
            </tr>
        `).join('');
    }

    function getStatusText(status) {
        const statuses = { pending: 'در انتظار', confirmed: 'تأیید شده', completed: 'انجام شده', cancelled: 'لغو شده' };
        return statuses[status] || status;
    }

    function viewAppointment(id) { window.location.href = `/dashboard/panel/patient/appointments.html?view=${id}`; }

    document.addEventListener('DOMContentLoaded', () => { if (!checkAuth()) return; loadPatientDashboard(); });
</script>
