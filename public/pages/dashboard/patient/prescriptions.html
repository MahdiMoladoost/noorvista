<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>نسخه‌ها | NoorVista</title>
<style>
        .prescription-card {
            background: linear-gradient(135deg, #fff, #f8fafc);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
        }
        .prescription-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
        .prescription-medicine { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted var(--border); }
        .prescription-footer { margin-top: 15px; padding-top: 10px; text-align: left; font-size: 12px; color: var(--gray); }
    </style>
<link href="/css/local-fonts.css" rel="stylesheet"/><link href="/css/open-iconic-bootstrap.min.css" rel="stylesheet"/><link href="/css/ionicons.min.css" rel="stylesheet"/><link href="/css/icomoon.css" rel="stylesheet"/><link href="/css/panel-common.css" rel="stylesheet"/><link href="/css/admin-enhancements.css" rel="stylesheet"/><link href="/css/noorvista-panel-polish.css" rel="stylesheet"/><link href="/css/noorvista-admin-header.css" rel="stylesheet"/><link href="/css/noorvista-manager-ui.css" rel="stylesheet"/><link href="/assets/css/panel-sidebar-unified-final.css" rel="stylesheet"/><link href="/assets/css/panel-header-avatar-unified.css" rel="stylesheet"/><link href="/assets/css/panel-role-layout-final.css" rel="stylesheet"/><link href="/assets/css/panel-role-exact-admin-users-parity.css" rel="stylesheet"/><link href="/assets/css/panel-pretty-selects-global.css" rel="stylesheet"/></head>
<body class="nv-role-panel nv-patient-panel" data-panel-role="patient">
<div class="sidebar">
<div class="sidebar-header"><div class="sidebar-logo">Noor<span>Vista</span></div><div class="sidebar-subtitle">پنل بیمار</div></div>
<ul class="sidebar-nav">
<li class="nav-item"><a class="nav-link" href="index.html"><i class="icon-dashboard"></i><span>داشبورد</span></a></li>
<li class="nav-item"><a class="nav-link" href="appointments.html"><i class="icon-calendar"></i><span>نوبت‌های من</span></a></li>
<li class="nav-item"><a class="nav-link" href="medical-records.html"><i class="icon-file-text"></i><span>پرونده پزشکی</span></a></li>
<li class="nav-item"><a class="nav-link active" href="prescriptions.html"><i class="icon-medkit"></i><span>نسخه‌ها</span></a></li>
<li class="nav-item"><a class="nav-link" href="payments.html"><i class="icon-credit-card"></i><span>پرداخت‌ها</span></a></li>
<li class="nav-item"><a class="nav-link" href="profile.html"><i class="icon-user"></i><span>پروفایل</span></a></li>
</ul>
<div class="nav-divider"></div>
<ul class="sidebar-nav"><li class="nav-item"><a class="nav-link logout-btn" href="#"><i class="icon-sign-out"></i><span>خروج</span></a></li></ul>
</div>
<div class="main-content">
<div class="top-header">
<div class="page-title"><h1>نسخه‌های پزشکی</h1><p>مشاهده و دانلود نسخه‌های تجویز شده</p></div>
<div class="header-actions">
<div class="search-box"><input placeholder="جستجو..." type="text"/><i class="icon-search"></i></div>
<div class="user-menu"><button class="notification-btn"><i class="icon-bell"></i><span class="notification-badge" style="display:none">0</span></button><div class="user-info"><div class="user-avatar">PT</div><span class="user-name"></span><i class="icon-chevron-down"></i></div></div>
</div>
</div>
<div class="card">
<div class="card-header"><h4><i class="icon-medkit"></i> لیست نسخه‌ها</h4></div>
<div class="card-body"><div id="prescriptionsList"></div></div>
</div>
</div>
<div class="modal-overlay" id="printPrescriptionModal"><div class="modal-container" style="max-width:600px;"><div class="modal-header"><h3>نسخه پزشکی</h3><button class="modal-close">×</button></div><div class="modal-body" id="printContent"></div><div class="modal-footer"><button class="btn btn-primary" onclick="window.print()"><i class="icon-print"></i> چاپ نسخه</button><button class="btn btn-outline" onclick="downloadPrescription()"><i class="icon-download"></i> دانلود PDF</button></div></div></div>
<script src="/js/jquery.min.js"></script>
<script src="/js/panel-common.js"></script>
<script>
        let currentPrescription = null;
        
        async function loadPrescriptions() {
            try {
                const prescriptions = await apiRequest('/api/patient/prescriptions');
                const container = document.getElementById('prescriptionsList');
                if (prescriptions.prescriptions?.length) {
                    container.innerHTML = prescriptions.prescriptions.map(p => `
                        <div class="prescription-card">
                            <div class="prescription-header">
                                <div><strong>تاریخ:</strong> ${p.record_date_jalali}</div>
                                <div><strong>دکتر:</strong> ${p.doctor_name}</div>
                            </div>
                            <div><strong>تشخیص:</strong> ${p.diagnosis || '-'}</div>
                            <div style="margin-top:12px;"><strong>نسخه:</strong></div>
                            <div style="background:white;padding:12px;border-radius:8px;margin-top:8px;">${p.prescription || '-'}</div>
                            <div class="prescription-footer">
                                <button class="btn btn-sm btn-primary" onclick="printPrescription(${p.id})"><i class="icon-print"></i> چاپ نسخه</button>
                                <button class="btn btn-sm btn-outline" onclick="downloadPrescription(${p.id})" style="margin-right:10px;"><i class="icon-download"></i> دانلود</button>
                            </div>
                        </div>
                    `).join('');
                } else { container.innerHTML = '<p class="text-center text-muted">هیچ نسخه‌ای ثبت نشده است</p>'; }
            } catch(e) { console.error(e); }
        }
        
        async function printPrescription(id) {
            try {
                const prescription = await apiRequest(`/api/patient/prescriptions/${id}`);
                currentPrescription = prescription;
                const printContent = document.getElementById('printContent');
                printContent.innerHTML = `
                    <div style="text-align:center;margin-bottom:20px;">
                        <h2>NoorVista</h2>
                        <p>کلینیک تخصصی چشم پزشکی</p>
                        <hr>
                    </div>
                    <div><strong>بیمار:</strong> ${prescription.patient_name}</div>
                    <div><strong>تاریخ:</strong> ${prescription.record_date_jalali}</div>
                    <div><strong>پزشک:</strong> دکتر ${prescription.doctor_name}</div>
                    <div style="margin-top:20px;"><strong>تشخیص:</strong></div>
                    <div style="border:1px solid #ccc;padding:10px;margin:10px 0;">${prescription.diagnosis || '-'}</div>
                    <div><strong>نسخه:</strong></div>
                    <div style="border:1px solid #ccc;padding:10px;margin:10px 0;">${prescription.prescription || '-'}</div>
                    <div style="margin-top:20px;text-align:center;font-size:12px;color:#999;">
                        <hr>این نسخه توسط سیستم مدیریت کلینیک NoorVista صادر شده است
                    </div>
                `;
                showModal('printPrescriptionModal');
            } catch(e) { console.error(e); }
        }
        
        function downloadPrescription(id) { showToast('در حال آماده‌سازی فایل PDF...', 'info'); }
        loadPrescriptions();
    </script>
<script src="/assets/js/role-admin-users-exact-parity.js"></script><script src="/assets/js/role-user-menu-exact-admin-fix.js"></script><script src="/assets/js/panel-pretty-selects-global.js"></script></body>
</html>
