<body class="nv-role-panel nv-patient-panel" data-panel-role="patient">
<div class="sidebar">
<div class="sidebar-header"><div class="sidebar-logo">Noor<span>Vista</span></div><div class="sidebar-subtitle">پنل بیمار</div></div>
<ul class="sidebar-nav">
<li class="nav-item"><a class="nav-link" href="index.html"><i class="icon-dashboard"></i><span>داشبورد</span></a></li>

</ul>

<ul class="sidebar-nav"><li class="nav-item"><a class="nav-link logout-btn" href="#"><i class="icon-sign-out"></i><span>خروج</span></a></li></ul>
</div>
<div class="main-content">
<div class="top-header">
<div class="page-title"><h1>سوابق پرداخت</h1><p>مشاهده تاریخچه پرداخت‌های شما</p></div>
<div class="header-actions">
<div class="search-box"><input placeholder="جستجو..." type="text"/><i class="icon-search"></i></div>
<div class="user-menu"><button class="notification-btn"><i class="icon-bell"></i><span class="notification-badge" style="display:none">0</span></button><div class="user-info"><div class="user-avatar">PT</div><span class="user-name"></span><i class="icon-chevron-down"></i></div></div>
</div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon"><i class="icon-credit-card"></i></div><div class="stat-info"><div class="stat-number" id="totalPaid">0</div><div class="stat-label">کل پرداختی</div></div></div>
<div class="stat-card"><div class="stat-icon"><i class="icon-warning"></i></div><div class="stat-info"><div class="stat-number" id="pendingAmount">0</div><div class="stat-label">مبلغ معوق</div></div></div>
</div>
<div class="card">
<div class="card-header"><h4><i class="icon-list"></i> تاریخچه پرداخت‌ها</h4></div>
<div class="card-body"><div class="table-responsive"><table class="data-table" id="paymentsTable"><thead><tr><th>تاریخ</th><th>مبلغ</th><th>روش پرداخت</th><th>وضعیت</th><th>شماره رسید</th></tr></thead><tbody></tbody></table></div></div>
</div>
<div class="card" id="unpaidCard" style="display:none;">
<div class="card-header"><h4><i class="icon-warning"></i> پرداخت‌های معوق</h4><button class="btn btn-sm btn-success" onclick="payOnline()">پرداخت آنلاین</button></div>
<div class="card-body"><div class="table-responsive"><table class="data-table" id="unpaidTable"><thead><tr><th>تاریخ نوبت</th><th>پزشک</th><th>مبلغ</th></tr></thead><tbody></tbody></table></div></div>
</div>
</div>
<script src="/js/jquery.min.js"></script>
<script src="/js/panel-common.js"></script>
<script>
        async function loadPayments() {
            try {
                const payments = await apiRequest('/api/patient/payments');
                document.getElementById('totalPaid').textContent = formatPrice(payments.total_paid || 0);
                document.getElementById('pendingAmount').textContent = formatPrice(payments.pending_amount || 0);
                renderTable('paymentsTable', payments.payments, [
                    { key: 'payment_date', label: 'تاریخ', type: 'date' }, { key: 'amount', label: 'مبلغ', type: 'price' },
                    { key: 'payment_method', label: 'روش پرداخت' }, { key: 'status', label: 'وضعیت', type: 'badge' },
                    { key: 'receipt_number', label: 'شماره رسید' }
                ]);
                
                const unpaidCard = document.getElementById('unpaidCard');
                if (payments.unpaid_appointments?.length) {
                    unpaidCard.style.display = 'block';
                    renderTable('unpaidTable', payments.unpaid_appointments, [
                        { key: 'appointment_date', label: 'تاریخ نوبت', type: 'date' }, { key: 'doctor_name', label: 'پزشک' },
                        { key: 'amount', label: 'مبلغ', type: 'price' }
                    ]);
                } else { unpaidCard.style.display = 'none'; }
            } catch(e) { console.error(e); }
        }
        
        function payOnline() { showToast('در حال انتقال به درگاه پرداخت...', 'info'); }
        loadPayments();
    </script>
<script src="/assets/js/role-admin-users-exact-parity.js"></script><script src="/assets/js/role-user-menu-exact-admin-fix.js"></script><script src="/assets/js/panel-pretty-selects-global.js"></script></body>
</html>
